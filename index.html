<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2A2420">
<meta name="description" content="Aplicativo de controle de estoque de linhas de costura, com identificação por cor e tipo (com ou sem cera).">
<title>Estoque de Linhas Couro Forte </title>
<script>
  (function () {
    var saved = localStorage.getItem('estoque-linhas-theme');
    var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;0,900;1,500;1,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="tag-eyebrow"> Controle de Estoque de Linhas de Blaquear  Couro Forte </div>
      <h1>Estoque de Linhas Couro Forte </h1>
    </div>
    <button class="theme-toggle" id="btnTheme" title="Alternar tema claro/escuro" aria-label="Alternar tema">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.8"/><path d="M12 2.5v2.2M12 19.3v2.2M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 14.5A8.5 8.5 0 019.5 4a8.5 8.5 0 1010.5 10.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="stats-row" id="statsRow"></div>
</header>

<div id="alertBanner"></div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar cor...">
  </div>
  <button class="btn-add" id="btnOpenAdd">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
    Nova linha
  </button>
  <button class="btn-pdf" id="btnPdf" title="Baixar PDF do estoque" aria-label="Baixar PDF do estoque">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<div class="filter-row" id="filterRow">
  <button class="fbtn active" data-f="todos">Todos</button>
  <button class="fbtn" data-f="cera">Com cera</button>
  <button class="fbtn" data-f="sem">Sem cera</button>
  <button class="fbtn" data-f="baixo">Estoque baixo</button>
</div>

<div class="grid" id="grid"></div>
<div id="emptyState"></div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h2 id="sheetTitle">Nova linha</h2>
    <div class="field">
      <label>Nome da cor</label>
      <input type="text" id="fName" placeholder="Ex: Vermelho Cereja">
    </div>
    <div class="field">
      <label>Cor</label>
      <div class="color-row">
        <input type="color" id="fColor" value="#1B1B1B">
        <span class="mono" id="fColorHex" style="font-size:13px;color:var(--ink-soft)">#1B1B1B</span>
      </div>
    </div>
    <div class="field">
      <label>Foto da linha (opcional)</label>
      <div class="photo-row">
        <div class="photo-preview" id="photoPreview"><span>Sem foto</span></div>
        <div class="photo-actions">
          <label class="btn-secondary photo-upload-btn">
            Escolher foto
            <input type="file" id="fPhoto" accept="image/*" hidden>
          </label>
          <button type="button" class="btn-secondary btn-danger" id="btnRemovePhoto">Remover</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Tipo de linha</label>
      <div class="wax-toggle" id="waxToggle">
        <button type="button" data-wax="1" class="sel">Com cera</button>
        <button type="button" data-wax="0">Sem cera</button>
      </div>
    </div>
    <div class="two-col">
      <div class="field">
        <label>Estoque atual</label>
        <input type="number" id="fQty" min="0" value="10">
      </div>
      <div class="field">
        <label>Alerta mínimo</label>
        <input type="number" id="fMin" min="0" value="5">
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-secondary" id="btnDelete" style="display:none;">Excluir</button>
      <button class="btn-secondary" id="btnCancel">Cancelar</button>
      <button class="btn-primary" id="btnSave">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="vendor/jspdf.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
